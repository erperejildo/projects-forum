name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate environment.ts
        run: node scripts/generate-environment.mjs
        env:
          FORUM_FIREBASE_API_KEY: ${{ secrets.FORUM_FIREBASE_API_KEY }}
          FORUM_FIREBASE_AUTH_DOMAIN: ${{ secrets.FORUM_FIREBASE_AUTH_DOMAIN }}
          FORUM_FIREBASE_PROJECT_ID: ${{ secrets.FORUM_FIREBASE_PROJECT_ID }}
          FORUM_FIREBASE_STORAGE_BUCKET: ${{ secrets.FORUM_FIREBASE_STORAGE_BUCKET }}
          FORUM_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FORUM_FIREBASE_MESSAGING_SENDER_ID }}
          FORUM_FIREBASE_APP_ID: ${{ secrets.FORUM_FIREBASE_APP_ID }}
          FORUM_FIREBASE_MEASUREMENT_ID: ${{ secrets.FORUM_FIREBASE_MEASUREMENT_ID }}
          FORUM_DEFAULT_PROJECT: ${{ secrets.FORUM_DEFAULT_PROJECT }}
          FORUM_PROJECTS: ${{ secrets.FORUM_PROJECTS }}
          FORUM_ADMIN_EMAIL: ${{ secrets.FORUM_ADMIN_EMAIL }}
          FORUM_MAIL_COLLECTION: ${{ secrets.FORUM_MAIL_COLLECTION }}

      - name: Run quality checks
        run: |
          npm run format:check
          npm run lint
          npm run test:ci

      - name: Build for GitHub Pages
        run: npm run build -- --configuration production --base-href "/${{ github.event.repository.name }}/"
        env:
          FORUM_FIREBASE_API_KEY: ${{ secrets.FORUM_FIREBASE_API_KEY }}
          FORUM_FIREBASE_AUTH_DOMAIN: ${{ secrets.FORUM_FIREBASE_AUTH_DOMAIN }}
          FORUM_FIREBASE_PROJECT_ID: ${{ secrets.FORUM_FIREBASE_PROJECT_ID }}
          FORUM_FIREBASE_STORAGE_BUCKET: ${{ secrets.FORUM_FIREBASE_STORAGE_BUCKET }}
          FORUM_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FORUM_FIREBASE_MESSAGING_SENDER_ID }}
          FORUM_FIREBASE_APP_ID: ${{ secrets.FORUM_FIREBASE_APP_ID }}
          FORUM_FIREBASE_MEASUREMENT_ID: ${{ secrets.FORUM_FIREBASE_MEASUREMENT_ID }}
          FORUM_DEFAULT_PROJECT: ${{ secrets.FORUM_DEFAULT_PROJECT }}
          FORUM_PROJECTS: ${{ secrets.FORUM_PROJECTS }}
          FORUM_ADMIN_EMAIL: ${{ secrets.FORUM_ADMIN_EMAIL }}
          FORUM_MAIL_COLLECTION: ${{ secrets.FORUM_MAIL_COLLECTION }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/forum-app/browser

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
