@if (isAuthenticated()) {
  <div class="user-pill">
    <span class="user-name">{{ userLabel() }}</span>
    <button type="button" class="secondary" (click)="logout()" [disabled]="isBusy()">
      {{ 'auth.logout' | translate }}
    </button>
  </div>
} @else {
  <div class="auth-wrapper">
    <button type="button" class="secondary" (click)="togglePanel()">
      {{ 'auth.signIn' | translate }}
    </button>

    @if (isPanelOpen()) {
      <button
        type="button"
        class="auth-backdrop"
        (click)="togglePanel()"
        [attr.aria-label]="'auth.closePanel' | translate"
      ></button>

      <section class="auth-panel" aria-label="Authentication panel">
        <h2>
          {{ (isRegisterMode() ? 'auth.createAccount' : 'auth.signInContinue') | translate }}
        </h2>

        <label>
          <span>{{ 'auth.email' | translate }}</span>
          <input
            type="email"
            [(ngModel)]="email"
            autocomplete="email"
            placeholder="you@example.com"
          />
        </label>

        <label>
          <span>{{ 'auth.password' | translate }}</span>
          <input
            type="password"
            [(ngModel)]="password"
            autocomplete="current-password"
            [placeholder]="'auth.passwordHint' | translate"
          />
        </label>

        @if (errorMessage()) {
          <p class="error">{{ errorMessage() }}</p>
        }

        <div class="panel-actions">
          <button
            type="button"
            class="primary"
            (click)="submitEmailPassword()"
            [disabled]="isBusy() || !email.trim() || !password.trim()"
          >
            {{ (isRegisterMode() ? 'auth.register' : 'auth.signIn') | translate }}
          </button>

          <button type="button" class="secondary" (click)="switchMode()" [disabled]="isBusy()">
            {{ (isRegisterMode() ? 'auth.switchToLogin' : 'auth.switchToRegister') | translate }}
          </button>

          <button type="button" class="google" (click)="loginWithGoogle()" [disabled]="isBusy()">
            {{ 'auth.continueGoogle' | translate }}
          </button>
        </div>
      </section>
    }
  </div>
}
