@if (posts().length === 0) {
  <p class="empty-message">{{ 'postList.empty' | translate }}</p>
} @else {
  <div class="post-list">
    @for (post of posts(); track post.id) {
      <app-post-card
        [post]="post"
        [liked]="isLiked(post.id)"
        (openPost)="onOpenPost($event)"
        (toggleVote)="onToggleVote($event)"
      />
    }
  </div>
}
