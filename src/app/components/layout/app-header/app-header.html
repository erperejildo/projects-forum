<header class="app-header">
  <a routerLink="/" class="brand" aria-label="Home">
    <span class="brand-mark">PF</span>
    <span class="brand-text">{{ 'header.brand' | translate }}</span>
  </a>

  <div class="header-actions">
    <a
      routerLink="/post/new"
      class="new-post-button"
      [class.disabled]="!isAuthenticated()"
      [attr.aria-disabled]="!isAuthenticated()"
    >
      {{ 'header.newPost' | translate }}
    </a>

    <app-language-switcher />
    <app-auth-panel />
  </div>
</header>
