<section class="filters-card" aria-label="Post filters">
  <h2>{{ 'filters.title' | translate }}</h2>

  <label class="field">
    <span>{{ 'filters.search' | translate }}</span>
    <input
      type="search"
      [value]="searchValue()"
      (input)="onSearchInput($any($event.target).value)"
      [placeholder]="'filters.searchPlaceholder' | translate"
    />
  </label>

  <label class="field">
    <span>{{ 'filters.project' | translate }}</span>
    <select [value]="filters().projectId" (change)="onProjectChange($any($event.target).value)">
      <option value="">{{ 'filters.allProjects' | translate }}</option>
      @for (project of projects(); track project.id) {
        <option [value]="project.id">{{ project.name }}</option>
      }
    </select>
  </label>

  <div class="tag-group">
    <span class="group-title">{{ 'filters.popularTags' | translate }}</span>

    @if (popularTags().length === 0) {
      <p class="helper">{{ 'filters.noTags' | translate }}</p>
    }

    <div class="tag-buttons">
      @for (tag of popularTags(); track tag) {
        <button
          type="button"
          class="tag"
          [class.active]="filters().selectedTag === tag"
          (click)="onTagSelect(tag)"
        >
          #{{ tag }}
        </button>
      }
    </div>
  </div>

  <label class="field">
    <span>{{ 'filters.order' | translate }}</span>
    <select [value]="order()" (change)="onOrderChange($any($event.target).value)">
      <option value="date">{{ 'filters.newest' | translate }}</option>
      <option value="likes">{{ 'filters.mostLiked' | translate }}</option>
      <option value="popularity">{{ 'filters.mostPopular' | translate }}</option>
    </select>
  </label>

  <button type="button" class="clear-button" (click)="clearFilters()">
    {{ 'filters.clear' | translate }}
  </button>
</section>
