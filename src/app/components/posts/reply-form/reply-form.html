<form class="reply-form" [formGroup]="form" (ngSubmit)="submit()">
  <label>
    <span>{{ 'replyForm.label' | translate }}</span>
    <textarea
      formControlName="message"
      rows="4"
      [disabled]="!enabled() || pending()"
      [placeholder]="'replyForm.placeholder' | translate"
    ></textarea>
  </label>

  @if (form.controls.message.touched && form.controls.message.invalid) {
    <p class="error">{{ 'replyForm.error' | translate }}</p>
  }

  <button type="submit" [disabled]="!enabled() || pending()">
    {{ (pending() ? 'replyForm.posting' : 'replyForm.post') | translate }}
  </button>

  @if (!enabled()) {
    <p class="hint">{{ 'replyForm.signInHint' | translate }}</p>
  }
</form>
