<button matFab extended [disabled]="disabled()" [attr.aria-pressed]="liked()" aria-label="Like"
    [class.is-liked]="liked()"
    (click)="onToggle($event)">
    <span class="like-count">{{ likesCount() }}</span>
    <!-- when liked we explicitly set fill on the generated SVG so tests can inspect it -->
    <mat-icon [attr.fill]="liked() ? 'currentColor' : null">favorite</mat-icon>
</button>
